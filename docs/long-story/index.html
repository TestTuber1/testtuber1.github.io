<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Story</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll/dist/locomotive-scroll.min.css">
    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll/dist/locomotive-scroll.min.js"></script>

    <link rel="stylesheet" href="styles.css" media="all">
    <script src="scripts.js" defer></script>
</head>

<body>
    <div data-scroll-container>

    <section class="panel" data-scroll-section>
      <h1 data-scroll data-scroll-speed="2">I'm Luffy! The Man Who Will Become the Pirate King!</h1>
    </section>

    <section class="panel" data-scroll-section>
        <img src="step1.jpg" 
           data-scroll 
           data-scroll-speed="-2" />
    </section>

    <section class="panel" data-scroll-section>
      <p data-scroll data-scroll-speed="1">
        Luffy is in a barrell, lost in the sea not knowing where he is.
      </p>
    </section>

    <section class="panel" data-scroll-section>
        <img src="step2.jpg" 
           data-scroll 
           data-scroll-speed="-2" />
    </section>

    <section class="panel" data-scroll-section>
      <p data-scroll data-scroll-speed="1">
        Luffy wakes up and breaks the barrell, in a ship.
      </p>
    </section>
  </div>
</body>
</html>
